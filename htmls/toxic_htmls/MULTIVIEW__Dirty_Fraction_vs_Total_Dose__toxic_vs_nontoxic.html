<div id='imgModal' class='img-modal' aria-hidden='true'>
  <button type='button' id='imgModalClose' class='img-modal-close' aria-label='Close'>&times;</button>
  <img id='imgModalImg' class='img-modal-img' alt='Expanded plot'>
  <div id='imgModalCap' class='img-modal-cap'></div>
</div>
<script>
(function(){
  const modal = document.getElementById('imgModal');
  const modalImg = document.getElementById('imgModalImg');
  const modalCap = document.getElementById('imgModalCap');
  const closeBtn = document.getElementById('imgModalClose');
  if(!modal || !modalImg || !closeBtn){ return; }

  function closeModal(){
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden','true');
    modalImg.removeAttribute('src');
    modalCap.textContent = '';
  }

  function openModal(src, alt){
    if(!src){ return; }
    modalImg.src = src;
    modalImg.alt = alt || 'Expanded plot';
    modalCap.textContent = alt || '';
    modal.classList.add('open');
    modal.setAttribute('aria-hidden','false');
  }

  document.querySelectorAll('.card img').forEach((img)=>{
    img.addEventListener('click', (e)=>{
      e.preventDefault();
      e.stopPropagation();
      openModal(img.getAttribute('src') || '', img.getAttribute('alt') || '');
    });
  });

  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (e)=>{ if(e.target === modal){ closeModal(); } });
  window.addEventListener('keydown', (e)=>{ if(e.key === 'Escape'){ closeModal(); } });
})();
</script>
